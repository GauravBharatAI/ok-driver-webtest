<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OK Driver · GPS Test Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:             #ffffff;
    --surface:        #f9fafb;
    --surface-hover:  #f3f4f6;
    --border:         #f0f0f0;
    --border-light:   #e5e7eb;
    --text:           #1a1a1a;
    --text-muted:     #6b7280;
    --text-dim:       #9ca3af;
    --green:          #22c55e;
    --green-d:        #15803d;
    --green-bg:       #f0fdf4;
    --green-bg-hover: #dcfce7;
    --red:            #ef4444;
    --red-d:          #b91c1c;
    --red-bg:         #fef2f2;
    --amber:          #f59e0b;
    --amber-bg:       #fffbeb;
    --blue:           #3b82f6;
    --blue-bg:        #eff6ff;
    --font-display:   'Syne', sans-serif;
    --font-body:      'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --shadow-sm:      0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:      0 4px 12px rgba(0,0,0,0.06);
    --radius-sm:      8px;
    --radius-md:      12px;
    --radius-lg:      16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ── header ── */
  header {
    padding: 16px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .logo span { color: var(--green); }

  .logo .sub {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 6px;
  }

  .env-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid #bbf7d0;
    text-transform: uppercase;
  }

  /* ── status bar ── */
  .status-bar {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.active {
    background: var(--green);
    box-shadow: 0 0 8px rgba(34,197,94,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  .status-dot.stopped { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.9); }
  }

  .status-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .status-text.active { color: var(--green); font-weight: 600; }
  .status-text.stopped { color: var(--red); font-weight: 600; }

  .status-context {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .context-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .context-dot.inapp { background: var(--green); }
  .context-dot.browser { background: var(--amber); }

  /* ── coords card ── */
  .coords-card {
    margin: 20px 24px 0;
    padding: 20px 24px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    flex-shrink: 0;
    box-shadow: var(--shadow-md);
  }

  .coords-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    font-weight: 600;
  }

  .coords-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .coord-item label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .coord-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    transition: color 0.2s;
    line-height: 1.2;
  }

  .coord-value.flash { color: #4ade80; }
  .coord-value.empty { color: var(--text-dim); }

  .coord-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── controls ── */
  .controls {
    display: flex;
    gap: 12px;
    padding: 20px 24px;
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    padding: 14px 16px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--bg);
    color: var(--text);
  }

  .btn svg {
    width: 16px;
    height: 16px;
    stroke-width: 1.5;
  }

  .btn-start {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }

  .btn-start:hover:not(:disabled) {
    background: #16a34a;
    border-color: #16a34a;
    box-shadow: 0 4px 12px rgba(34,197,94,0.25);
    transform: translateY(-1px);
  }

  .btn-stop {
    background: white;
    color: var(--red);
    border-color: #fecaca;
  }

  .btn-stop:hover:not(:disabled) {
    background: var(--red-bg);
    border-color: var(--red);
    box-shadow: 0 4px 12px rgba(239,68,68,0.1);
    transform: translateY(-1px);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-clear {
    flex: 0 0 auto;
    padding: 14px 20px;
    background: white;
    color: var(--text-muted);
    border-color: var(--border-light);
  }

  .btn-clear:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--text-dim);
  }

  /* ── standard API test section ── */
  .section-header {
    padding: 8px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 24px 12px;
    flex-shrink: 0;
  }

  .btn-test-api {
    margin: 0 24px 20px;
    padding: 12px 16px;
    background: var(--blue-bg);
    color: var(--blue);
    border: 1px solid #bfdbfe;
    border-radius: var(--radius-md);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.2s;
    width: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-test-api:hover:not(:disabled) {
    background: #dbeafe;
  }

  .btn-test-api:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .api-hint {
    padding: 0 24px 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── logger area ── */
  .logger-header {
    padding: 8px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logger-title {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }

  .log-count {
    background: var(--surface);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid var(--border-light);
  }

  .log-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  .log-entry {
    display: grid;
    grid-template-columns: 54px 1fr 1fr auto;
    gap: 8px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    animation: slideIn 0.2s ease-out;
    background: var(--bg);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-entry:nth-child(odd) {
    background: var(--surface);
  }

  .log-entry:first-child {
    background: var(--green-bg);
    border-color: #bbf7d0;
  }

  .log-entry:hover {
    background: var(--surface-hover);
  }

  .log-idx {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    text-align: right;
  }

  .log-lat, .log-lon {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .log-lat { color: #15803d; }
  .log-lon { color: #1d4ed8; }

  .log-meta {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
  }

  .log-acc { display: block; }
  .log-time { display: block; color: var(--text-dim); }

  /* system log entries */
  .sys-entries {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 6px;
  }

  .sys-entry {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.2s ease-out;
    font-weight: 500;
    background: var(--bg);
    border: 1px solid var(--border);
  }

  .sys-entry.info  { background: var(--blue-bg); border-color: #bfdbfe; color: var(--blue); }
  .sys-entry.ok    { background: var(--green-bg); border-color: #bbf7d0; color: var(--green); }
  .sys-entry.warn  { background: var(--amber-bg); border-color: #fde68a; color: var(--amber); }
  .sys-entry.err   { background: var(--red-bg); border-color: #fecaca; color: var(--red); }

  .sys-time { opacity: 0.6; font-size: 11px; flex-shrink: 0; font-weight: 400; }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.8;
    display: none;
    background: var(--surface);
    border-radius: var(--radius-md);
    margin-top: 8px;
    border: 1px dashed var(--border-light);
  }

  .empty-state.show { display: block; }

  /* responsive */
  @media (max-width: 480px) {
    .coords-card { padding: 16px; }
    .coord-value { font-size: 20px; }
    .controls { flex-wrap: wrap; }
    .btn { flex: 1 1 45%; }
    .btn-clear { flex: 0 0 auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    OK<span>Driver</span>
    <span class="sub">/ gps test</span>
  </div>
  <div class="env-badge">Test Build</div>
</header>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Idle — waiting for start</span>
  <span class="status-context" id="statusContext">
    <span class="context-dot browser" id="contextDot"></span>
    <span id="inApp">—</span>
  </span>
</div>

<div class="coords-card">
  <div class="coords-label">Current Position</div>
  <div class="coords-grid">
    <div class="coord-item">
      <label>Latitude</label>
      <div class="coord-value empty" id="latVal">—</div>
      <div class="coord-meta" id="accVal">accuracy: —</div>
    </div>
    <div class="coord-item">
      <label>Longitude</label>
      <div class="coord-value empty" id="lonVal">—</div>
      <div class="coord-meta" id="speedVal">speed: —</div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-start" id="btnStart" onclick="sendStart()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="8" cy="8" r="6.5"/>
      <path d="M6.5 5.5l4 2.5-4 2.5V5.5z" fill="currentColor" stroke="none"/>
    </svg>
    Start tracking
  </button>
  <button class="btn btn-stop" id="btnStop" onclick="sendStop()" disabled>
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="8" cy="8" r="6.5"/>
      <rect x="5.5" y="5.5" width="5" height="5" rx="1" fill="currentColor" stroke="none"/>
    </svg>
    Stop tracking
  </button>
  <button class="btn btn-clear" onclick="clearLog()" title="Clear log">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 4h10M6 4V2.5h4V4M5 4l.5 9.5h5L11 4"/>
    </svg>
  </button>
</div>

<div class="divider"></div>

<div class="section-header">
  <div class="section-title">Standard API Test</div>
</div>
<button id="btnStandardTest" onclick="runStandardGPSTest()" class="btn-test-api">
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l3 2"/></svg>
  Test Standard watchPosition()
</button>
<div class="api-hint">
  Uses the standard <code style="background:#f3f4f6; padding:1px 4px; border-radius:3px;">navigator.geolocation</code> API (intercepted by native bridge).
</div>

<div class="divider"></div>

<div class="logger-header">
  <div class="logger-title">
    Location log
    <span class="log-count" id="logCount">0</span>
  </div>
</div>

<div class="log-list" id="logList">
  <div class="sys-entries" id="sysEntries"></div>
  <div class="empty-state show" id="emptyState">
    tap start tracking<br>then watch coordinates appear here
  </div>
</div>

<script>
  // ── state ──
  let isTracking = false
  let logCounter = 0
  const isInApp  = !!window.ReactNativeWebView

  // update context indicator
  const contextDot = document.getElementById('contextDot')
  const inAppText = document.getElementById('inApp')
  if (isInApp) {
    contextDot.className = 'context-dot inapp'
    inAppText.textContent = 'inside app'
    addSysLog('Running inside native app — GPS bridge active', 'ok')
  } else {
    contextDot.className = 'context-dot browser'
    inAppText.textContent = 'browser (no GPS)'
    addSysLog('Running in browser — LOCATION_UPDATE won\'t arrive until opened inside app', 'warn')
  }

  function notifyApp(type) {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type }))
    }
  }

  let browserWatchId = null

  function startBrowserGPS() {
    if (!navigator.geolocation) {
      addSysLog('Geolocation not supported by browser', 'err')
      return
    }
    addSysLog('Using browser Geolocation API', 'info')
    browserWatchId = navigator.geolocation.watchPosition(
      (pos) => onLocationUpdate({
        type: 'LOCATION_UPDATE',
        latitude:  pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy:  pos.coords.accuracy,
        speed:     pos.coords.speed,
        altitude:  pos.coords.altitude,
        heading:   pos.coords.heading,
        timestamp: pos.timestamp
      }),
      (err) => addSysLog(`Browser GPS Error: ${err.message}`, 'err'),
      { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
    )
  }

  function stopBrowserGPS() {
    if (browserWatchId !== null) {
      navigator.geolocation.clearWatch(browserWatchId)
      browserWatchId = null
    }
  }

  function sendStart() {
    notifyApp('TRACKING_START')
    isTracking = true
    setStatus('active', 'Tracking active — GPS incoming')
    document.getElementById('btnStart').disabled = true
    document.getElementById('btnStop').disabled  = false
    document.getElementById('emptyState').classList.remove('show')
    addSysLog('Sent TRACKING_START → app', 'ok')
    if (!isInApp) startBrowserGPS()
  }

  function sendStop() {
    notifyApp('TRACKING_STOP')
    isTracking = false
    setStatus('stopped', 'Tracking stopped')
    document.getElementById('btnStart').disabled = false
    document.getElementById('btnStop').disabled  = true
    addSysLog('Sent TRACKING_STOP → app', 'warn')
    if (!isInApp) stopBrowserGPS()
  }

  function clearLog() {
    document.getElementById('logList').innerHTML =
      '<div class="sys-entries" id="sysEntries"></div>' +
      '<div class="empty-state' + (isTracking ? '' : ' show') + '" id="emptyState">tap start tracking<br>then watch coordinates appear here</div>'
    logCounter = 0
    updateCount()
  }

  window.addEventListener('message', (evt) => {
    let data
    try { data = typeof evt.data === 'string' ? JSON.parse(evt.data) : evt.data } catch { return }
    if (data.type === 'LOCATION_UPDATE') onLocationUpdate(data)
  })

  function onLocationUpdate(d) {
    logCounter++
    updateCount()

    const latEl = document.getElementById('latVal')
    const lonEl = document.getElementById('lonVal')
    latEl.textContent = d.latitude.toFixed(6)
    lonEl.textContent = d.longitude.toFixed(6)
    latEl.classList.remove('empty')
    lonEl.classList.remove('empty')
    latEl.classList.add('flash')
    lonEl.classList.add('flash')
    setTimeout(() => { latEl.classList.remove('flash'); lonEl.classList.remove('flash') }, 300)

    document.getElementById('accVal').textContent = 'accuracy: ' + (d.accuracy ? d.accuracy.toFixed(1) + 'm' : '—')
    document.getElementById('speedVal').textContent = 'speed: ' + (d.speed != null ? (d.speed * 3.6).toFixed(1) + ' km/h' : '—')

    const now    = new Date(d.timestamp || Date.now())
    const time   = now.toTimeString().slice(0, 8)
    const entry  = document.createElement('div')
    entry.className = 'log-entry'
    entry.innerHTML = `
      <span class="log-idx">#${logCounter}</span>
      <span class="log-lat">${d.latitude.toFixed(6)}</span>
      <span class="log-lon">${d.longitude.toFixed(6)}</span>
      <span class="log-meta">
        <span class="log-acc">${d.accuracy ? '±' + d.accuracy.toFixed(0) + 'm' : '—'}</span>
        <span class="log-time">${time}</span>
      </span>
    `
    const sysEntries = document.getElementById('sysEntries')
    sysEntries.parentNode.insertBefore(entry, sysEntries.nextSibling)
  }

  function addSysLog(msg, type = 'info') {
    const time = new Date().toTimeString().slice(0, 8)
    const el   = document.createElement('div')
    el.className = `sys-entry ${type}`
    el.innerHTML = `<span class="sys-time">${time}</span><span>${msg}</span>`
    document.getElementById('sysEntries').appendChild(el)
  }

  function setStatus(state, text) {
    const dot = document.getElementById('statusDot')
    const txt = document.getElementById('statusText')
    dot.className = 'status-dot ' + state
    txt.className = 'status-text ' + state
    txt.textContent = text
  }

  function updateCount() {
    document.getElementById('logCount').textContent = logCounter
  }

  // Deep Link Timeout Pattern
  function tryOpenAppWithTimeout(token) {
    const appUrl = `okdriver://driver/${token}`;
    const start = Date.now();
    addSysLog(`Attempting to launch: ${appUrl}`, 'info');
    window.location.href = appUrl;
    setTimeout(() => {
      if (Date.now() - start < 2500) {
        addSysLog('App not detected after 2s. User stayed on web page.', 'warn');
        alert('App not detected. In production you would redirect to the App Store.');
      }
    }, 2000);
  }

  window.addEventListener('load', () => {
    const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
    if (!isInApp && isMobile) {
      setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || 'AUTO_TOKEN';
        addSysLog('Mobile browser detected. Attempting automatic app launch...', 'info');
        tryOpenAppWithTimeout(token);
      }, 500);
    }
  });

  // ── Standard API Test ────────────────────────────────────────────────────
  function runStandardGPSTest() {
    addSysLog('Calling navigator.geolocation.watchPosition()...', 'info');
    
    const btn = document.getElementById('btnStandardTest');
    btn.disabled = true;
    btn.textContent = 'Watcher Active...';

    navigator.geolocation.watchPosition(
      (pos) => {
        addSysLog('Received update via Standard API', 'ok');
        onLocationUpdate({
          latitude: pos.coords.latitude,
          longitude: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          speed: pos.coords.speed,
          timestamp: pos.timestamp
        });
      },
      (err) => {
        addSysLog(`Standard API Error: ${err.message}`, 'err');
        btn.disabled = false;
        btn.textContent = 'Test Standard watchPosition()';
      },
      { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
  }
</script>
